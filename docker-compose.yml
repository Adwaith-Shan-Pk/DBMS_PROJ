services:
  mysql:
    image: mysql:8.0
    container_name: inventory_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: inventory_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./setup.sql:/docker-entrypoint-initdb.d/01_setup.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inventory_backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NUXT_DB_HOST: mysql
      NUXT_DB_PORT: "3306"
      NUXT_DB_USER: root
      NUXT_DB_PASSWORD: rootpassword
      NUXT_DB_NAME: inventory_db
      NUXT_FRONTEND_URL: http://localhost:3000
      PORT: "3001"
      NITRO_PORT: "3001"
      NODE_ENV: production
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_BASE: http://localhost:3001
    container_name: inventory_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      NITRO_PORT: "3000"
      NODE_ENV: production
    depends_on:
      - backend

volumes:
  mysql_data:
